<svg width="360" height="360" viewBox="0 0 360 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Shish Shawarma &amp; Grill">
  <rect width="360" height="360" rx="28" fill="#111111"/>
  <!-- Arabic wordmark -->
  <text x="180" y="66" text-anchor="middle" fill="#E7B94E" font-family="'Segoe UI', 'Noto Naskh Arabic', serif" font-size="34" font-weight="700" direction="rtl">شيش شاورما</text>

  <!-- Shawarma spit / skewer mark -->
  <g transform="translate(180 190)">
    <!-- top skewer knob -->
    <circle cx="0" cy="-78" r="9" fill="#E7B94E"/>
    <rect x="-3" y="-78" width="6" height="150" rx="3" fill="#E7B94E"/>
    <!-- meat cone stack -->
    <path d="M0 -64
             C 34 -58 44 -40 40 -22
             C 52 -18 58 -2 48 12
             C 60 18 60 36 46 46
             C 30 58 -30 58 -46 46
             C -60 36 -60 18 -48 12
             C -58 -2 -52 -18 -40 -22
             C -44 -40 -34 -58 0 -64 Z"
          fill="#E7B94E"/>
    <!-- carving lines -->
    <path d="M-40 -22 C -10 -14 20 -14 40 -22" stroke="#111111" stroke-width="3" fill="none" stroke-linecap="round"/>
    <path d="M-48 12 C -14 22 24 22 48 12" stroke="#111111" stroke-width="3" fill="none" stroke-linecap="round"/>
    <!-- bottom skewer point -->
    <path d="M-4 72 L0 90 L4 72 Z" fill="#E7B94E"/>
  </g>

  <!-- English wordmark -->
  <text x="180" y="304" text-anchor="middle" fill="#E7B94E" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="700" letter-spacing="1">SHISH</text>
  <text x="180" y="332" text-anchor="middle" fill="#E7B94E" font-family="'Segoe UI', Arial, sans-serif" font-size="15" font-weight="600" letter-spacing="5">SHAWARMA &amp; GRILL</text>
</svg>
